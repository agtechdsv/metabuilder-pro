<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="structureGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="800" rx="160" fill="#09090B" />
  
  <!-- Outer Tech Rings -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#27272A" stroke-width="2" stroke-dasharray="16 8" />
  <circle cx="400" cy="400" r="280" fill="none" stroke="#3F3F46" stroke-width="1" />
  
  <!-- Isometric Grid Lines -->
  <path d="M 200 400 L 400 300 L 600 400 L 400 500 Z" fill="none" stroke="#27272A" stroke-width="2" />
  <path d="M 400 150 L 400 650 M 150 400 L 650 400" fill="none" stroke="#18181B" stroke-width="1.5" />

  <!-- Main Construction Block -->
  <g transform="translate(0, -30)">
    <!-- Behind Shadow -->
    <path d="M 400 520 L 220 410 L 400 300 L 580 410 Z" fill="rgba(0,0,0,0.4)" filter="blur(20px)" />
    
    <!-- Base Plate -->
    <path d="M 400 500 L 250 410 L 400 320 L 550 410 Z" fill="url(#structureGrad)" stroke="#4338CA" stroke-width="1.5" opacity="0.8" />
    
    <!-- Vertical Pillars -->
    <!-- Left Pillar -->
    <rect x="245" y="270" width="10" height="140" rx="2" fill="#312E81" stroke="#4338CA" stroke-width="1" />
    <!-- Right Pillar -->
    <rect x="545" y="270" width="10" height="140" rx="2" fill="#312E81" stroke="#4338CA" stroke-width="1" />
    <!-- Center Pillar -->
    <rect x="395" y="180" width="10" height="140" rx="2" fill="#4338CA" stroke="#6366F1" stroke-width="1" opacity="0.6" />

    <!-- Isometric Dynamic Flow Curve -->
    <path d="M 200 320 Q 320 220 400 350 T 600 380" fill="none" stroke="url(#flowGrad)" stroke-width="28" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Inner overlay line for high-tech neon wireframe look -->
    <path d="M 200 320 Q 320 220 400 350 T 600 380" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.9" />

    <!-- Interactive Nodes -->
    <circle cx="200" cy="320" r="16" fill="#4F46E5" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)" />
    <circle cx="340" cy="275" r="12" fill="#8B5CF6" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="450" cy="365" r="14" fill="#06B6D4" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)" />
    <circle cx="600" cy="380" r="18" fill="#10B981" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)" />

    <!-- Top Grid / Roof Structure -->
    <path d="M 400 180 L 280 250 L 400 320 L 520 250 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-dasharray="6 4" />
    <path d="M 400 180 L 400 230" fill="none" stroke="#8B5CF6" stroke-width="3" />
  </g>

  <!-- Title Text -->
  <text x="400" y="690" text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="52" fill="#FFFFFF" letter-spacing="8">
    BUILD<tspan fill="url(#flowGrad)">FLOW</tspan>
  </text>
  
  <text x="400" y="735" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="16" fill="#71717A" letter-spacing="4">
    WORKFLOW &amp; CONSTRUCTION INTELLIGENCE
  </text>
</svg>
